<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@4.5.0/latin.css" rel="stylesheet">
    <style>
        :root {
            --bg: #000;
            --surface: rgba(255,255,255,0.06);
            --surface-hover: rgba(255,255,255,0.1);
            --border: rgba(255,255,255,0.12);
            --text: #fff;
            --text-dim: rgba(255,255,255,0.5);
            --accent: #3b82f6;
            --accent-bright: #60a5fa;
            --red: #ef4444;
            --green: #22c55e;
            --radius: 16px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
        }

        /* Permission Screen */
        #permissionScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s, transform 0.5s;
        }

        #permissionScreen.hidden {
            opacity: 0;
            transform: scale(1.05);
            pointer-events: none;
        }

        .perm-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            animation: breathe 2s ease-in-out infinite;
        }

        @keyframes breathe {
            0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 40px 10px rgba(59,130,246,0.2); }
        }

        .perm-icon svg { width: 56px; height: 56px; fill: white; }

        .perm-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }

        .perm-subtitle {
            font-size: 16px;
            color: var(--text-dim);
            text-align: center;
            max-width: 400px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .perm-btn {
            padding: 16px 48px;
            border-radius: 50px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 18px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }

        .perm-btn:hover {
            background: var(--accent-bright);
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(59,130,246,0.4);
        }

        .perm-error {
            color: var(--red);
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        /* Main App */
        #mainApp {
            display: none;
            height: 100vh;
            position: relative;
        }

        #mainApp.active { display: block; }

        /* Camera Background */
        #cameraBg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        #cameraBg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .camera-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.2) 30%, rgba(0,0,0,0.2) 70%, rgba(0,0,0,0.7) 100%);
            z-index: 1;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand span { color: var(--accent-bright); }

        .res-badge {
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            font-size: 13px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        /* Text Panel */
        #textPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 65vh;
            display: flex;
            flex-direction: column;
        }

        #textPanel.collapsed {
            transform: translateY(calc(100% - 60px));
        }

        .panel-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            margin: 12px auto 0;
            cursor: pointer;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px 8px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .char-count {
            font-size: 12px;
            color: var(--text-dim);
        }

        .text-input-wrap {
            padding: 8px 24px 16px;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #scriptInput {
            width: 100%;
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            line-height: 1.7;
            padding: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            backdrop-filter: blur(20px);
            min-height: 120px;
        }

        #scriptInput:focus {
            border-color: var(--accent);
        }

        #scriptInput::placeholder { color: var(--text-dim); }

        .panel-footer {
            padding: 8px 24px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Controls */
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--surface);
            border-radius: 10px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .ctrl-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ctrl-val {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-bright);
            min-width: 30px;
            text-align: center;
        }

        .ctrl-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .ctrl-btn:hover { background: rgba(255,255,255,0.2); }

        .record-btn {
            padding: 12px 32px;
            border-radius: 50px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .record-btn.idle {
            background: var(--red);
            color: white;
        }

        .record-btn.idle:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(239,68,68,0.4);
        }

        .record-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* Countdown Overlay */
        #countdownOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #countdownOverlay.active { display: flex; }

        .countdown-num {
            font-size: 180px;
            font-weight: 800;
            color: white;
            animation: countPop 1s ease-out;
            text-shadow: 0 0 60px rgba(239,68,68,0.5);
        }

        @keyframes countPop {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .countdown-text {
            font-size: 18px;
            color: var(--text-dim);
            margin-top: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Recording Screen */
        #recordingScreen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
        }

        #recordingScreen.active { display: block; }

        .rec-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 60;
        }

        .rec-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rec-dot {
            width: 14px;
            height: 14px;
            background: var(--red);
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .rec-time {
            font-size: 18px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .rec-res {
            font-size: 12px;
            color: var(--text-dim);
            padding: 4px 10px;
            background: var(--surface);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        /* Teleprompter Text in Recording */
        .tp-area {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            overflow: hidden;
        }

        .tp-scroll-box {
            width: 85%;
            max-width: 900px;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .tp-scroll-content {
            position: absolute;
            width: 100%;
            text-align: center;
            will-change: transform;
            padding: 50vh 10px;
        }

        .tp-scroll-content p {
            color: #fff;
            font-weight: 600;
            line-height: 1.5;
            text-shadow: 0 0 30px rgba(0,0,0,0.9), 0 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 1.2em;
        }

        .tp-fade-top, .tp-fade-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 25%;
            pointer-events: none;
            z-index: 55;
        }

        .tp-fade-top {
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
        }

        .tp-fade-bottom {
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
        }

        .tp-guide {
            position: absolute;
            top: 42%;
            left: 8%;
            right: 8%;
            height: 2px;
            background: rgba(59,130,246,0.4);
            z-index: 56;
            pointer-events: none;
        }

        /* Recording Controls */
        .rec-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 24px 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
            z-index: 60;
        }

        .rec-ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .rec-ctrl-btn:hover { background: var(--surface-hover); border-color: var(--accent); }
        .rec-ctrl-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .rec-ctrl-btn.stop-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--red);
            border-color: var(--red);
        }

        .rec-ctrl-btn.stop-btn:hover { background: #dc2626; border-color: #dc2626; }

        .rec-ctrl-btn.rewind-btn {
            background: rgba(59,130,246,0.3);
            border-color: var(--accent);
        }

        .rec-ctrl-btn.rewind-btn:hover { background: rgba(59,130,246,0.5); }

        .speed-display {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-bright);
            min-width: 40px;
            text-align: center;
            padding: 6px 0;
        }

        .tp-toggle-label {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 2px;
        }

        /* Progress bar */
        .tp-progress {
            position: absolute;
            bottom: 110px;
            left: 10%;
            right: 10%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            z-index: 60;
            overflow: hidden;
        }

        .tp-progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        /* Recordings Gallery */
        #gallerySection {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            max-height: 40vh;
            overflow-y: auto;
            padding: 16px 24px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 60%, transparent);
            display: none;
        }

        #gallerySection.active { display: block; }

        .gallery-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .gallery-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .gallery-item {
            flex-shrink: 0;
            width: 200px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .gallery-item:hover { border-color: var(--accent); }

        .gallery-item video {
            width: 100%;
            height: 112px;
            object-fit: cover;
            background: #000;
            display: block;
        }

        .gallery-item-info {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .gallery-item-info span {
            font-size: 12px;
            font-weight: 500;
        }

        .gallery-dl-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .gallery-dl-btn:hover { background: var(--accent-bright); }
        .gallery-dl-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            padding: 12px 24px;
            background: rgba(30,30,40,0.95);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Camera off state */
        .no-camera-msg {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            flex-direction: column;
            gap: 16px;
        }

        .no-camera-msg svg { width: 48px; height: 48px; fill: var(--text-dim); }
        .no-camera-msg p { color: var(--text-dim); font-size: 14px; }

        /* Debug panel */
        #debugPanel {
            position: fixed;
            top: 60px;
            right: 16px;
            background: rgba(0,0,0,0.9);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 11px;
            font-family: monospace;
            color: #0f0;
            z-index: 999;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        #debugPanel.active { display: block; }

        @media (max-width: 768px) {
            .perm-title { font-size: 22px; }
            .perm-icon { width: 90px; height: 90px; }
            .perm-icon svg { width: 40px; height: 40px; }
            .panel-footer { gap: 8px; }
            .ctrl-group { padding: 4px 8px; }
            .record-btn { padding: 10px 20px; font-size: 14px; }
            .countdown-num { font-size: 120px; }
            .tp-scroll-content p { font-size: inherit; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <!-- Permission Screen -->
    <div id="permissionScreen">
        <div class="perm-icon">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </div>
        <div class="perm-title">Acesso à Câmera</div>
        <div class="perm-subtitle">
            O Teleprompter Studio precisa acessar sua câmera para gravar seus vídeos com teleprompter integrado.
        </div>
        <button class="perm-btn" onclick="requestCamera()">Permitir Acesso</button>
        <div class="perm-error" id="permError"></div>
    </div>

    <!-- Main App -->
    <div id="mainApp">
        <div id="cameraBg">
            <video id="mainCameraVideo" autoplay muted playsinline></video>
            <div class="no-camera-msg" id="noCameraMsg" style="display:none;">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                <p>Câmera não disponível</p>
            </div>
        </div>
        <div class="camera-overlay"></div>

        <div class="top-bar">
            <div class="brand">Teleprompter <span>Studio</span></div>
            <div class="res-badge" id="resBadge">Carregando...</div>
        </div>

        <!-- Text Panel -->
        <div id="textPanel" class="collapsed">
            <div class="panel-handle" onclick="togglePanel()"></div>
            <div class="panel-header">
                <span class="panel-title">Roteiro</span>
                <span class="char-count" id="charCount">0 caracteres</span>
            </div>
            <div class="text-input-wrap">
                <textarea id="scriptInput" placeholder="Cole ou digite seu roteiro aqui...&#10;&#10;Sem limite de caracteres — escreva livremente.&#10;O texto aparecerá no teleprompter durante a gravação."></textarea>
            </div>
            <div class="panel-footer">
                <div class="ctrl-group">
                    <span class="ctrl-label">Vel.</span>
                    <button class="ctrl-btn" onclick="adjustSpeed(-1)">−</button>
                    <span class="ctrl-val" id="speedVal">5</span>
                    <button class="ctrl-btn" onclick="adjustSpeed(1)">+</button>
                </div>
                <div class="ctrl-group">
                    <span class="ctrl-label">Fonte</span>
                    <button class="ctrl-btn" onclick="adjustFont(-2)">−</button>
                    <span class="ctrl-val" id="fontVal">32</span>
                    <button class="ctrl-btn" onclick="adjustFont(2)">+</button>
                </div>
                <button class="record-btn idle" id="recordBtn" onclick="startCountdown()">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>
                    Gravar
                </button>
            </div>
        </div>
    </div>

    <!-- Countdown Overlay -->
    <div id="countdownOverlay">
        <div class="countdown-num" id="countdownNum">5</div>
        <div class="countdown-text">Preparando gravação...</div>
    </div>

    <!-- Recording Screen -->
    <div id="recordingScreen">
        <video id="recVideo" autoplay muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);"></video>

        <div class="tp-fade-top"></div>
        <div class="tp-fade-bottom"></div>
        <div class="tp-guide"></div>

        <div class="tp-area">
            <div class="tp-scroll-box">
                <div class="tp-scroll-content" id="tpScrollContent"></div>
            </div>
        </div>

        <div class="tp-progress" id="tpProgressWrap">
            <div class="tp-progress-fill" id="tpProgressFill"></div>
        </div>

        <div class="rec-top-bar">
            <div class="rec-indicator">
                <div class="rec-dot"></div>
                <span class="rec-time" id="recTime">00:00</span>
            </div>
            <span class="rec-res" id="recResBadge">4K</span>
        </div>

        <div class="rec-bottom">
            <button class="rec-ctrl-btn" onclick="adjustRecSpeed(-1)" title="Velocidade -">
                <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
            </button>
            <div>
                <div class="speed-display" id="recSpeedDisplay">5x</div>
            </div>
            <button class="rec-ctrl-btn" onclick="adjustRecSpeed(1)" title="Velocidade +">
                <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
            <button class="rec-ctrl-btn" id="tpToggleBtn" onclick="toggleTPVisibility()" title="Mostrar/Ocultar Teleprompter">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.002 1.002 0 000-1.41l-2.34-2.34a1.002 1.002 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </button>
            <div>
                <button class="rec-ctrl-btn rewind-btn" onclick="rewindText()" title="Voltar ao início do texto">
                    <svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
                </button>
                <div class="tp-toggle-label">Reiniciar</div>
            </div>
            <button class="rec-ctrl-btn" onclick="adjustRecFont(-2)" title="Fonte -">
                <svg viewBox="0 0 24 24"><path d="M9 4v3h5v12h3V7h5V4H9zm-6 8h3v7h3v-7h3V9H3v3z"/></svg>
            </button>
            <button class="rec-ctrl-btn" onclick="adjustRecFont(2)" title="Fonte +">
                <svg viewBox="0 0 24 24"><path d="M9 4v3h5v12h3V7h5V4H9zm-6 8h3v7h3v-7h3V9H3v3z"/></svg>
            </button>
            <button class="rec-ctrl-btn stop-btn" onclick="stopRecording()" title="Parar gravação">
                <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
            </button>
        </div>
    </div>

    <!-- Gallery -->
    <div id="gallerySection">
        <div class="gallery-title">Gravações Recentes</div>
        <div class="gallery-list" id="galleryList"></div>
    </div>

    <!-- Debug Panel -->
    <div id="debugPanel"></div>

    <div id="toast"></div>

    <script>
        // ============================================================
        // TELEPROMPTER STUDIO - VERSÃO CORRIGIDA
        // ============================================================

        // State
        let cameraStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recStartTime = null;
        let recTimerInterval = null;
        let scrollPos = 0;
        let scrollSpeed = 5;
        let fontSize = 32;
        let tpVisible = true;
        let scrollRAF = null;
        let recordings = [];
        let recCount = 0;
        let panelExpanded = false;
        let videoWidth = 1920;
        let videoHeight = 1080;
        let isStopping = false;
        let recorderMimeType = '';

        // Elements
        const permissionScreen = document.getElementById('permissionScreen');
        const mainApp = document.getElementById('mainApp');
        const mainCameraVideo = document.getElementById('mainCameraVideo');
        const scriptInput = document.getElementById('scriptInput');
        const charCount = document.getElementById('charCount');
        const resBadge = document.getElementById('resBadge');
        const countdownOverlay = document.getElementById('countdownOverlay');
        const countdownNum = document.getElementById('countdownNum');
        const recordingScreen = document.getElementById('recordingScreen');
        const recVideo = document.getElementById('recVideo');
        const tpScrollContent = document.getElementById('tpScrollContent');
        const recTime = document.getElementById('recTime');
        const recResBadge = document.getElementById('recResBadge');
        const tpProgressFill = document.getElementById('tpProgressFill');
        const galleryList = document.getElementById('galleryList');
        const gallerySection = document.getElementById('gallerySection');
        const debugPanel = document.getElementById('debugPanel');

        // ============================================================
        // FUNÇÕES DE DEBUG
        // ============================================================
        function debug(msg) {
            console.log('[Teleprompter]', msg);
            const line = document.createElement('div');
            line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
            debugPanel.appendChild(line);
            debugPanel.scrollTop = debugPanel.scrollHeight;
            // Mostrar painel automaticamente em caso de erro
            if (msg.includes('ERRO') || msg.includes('FALHA')) {
                debugPanel.classList.add('active');
            }
        }

        // ============================================================
        // CAMERA
        // ============================================================
        async function requestCamera() {
            const errEl = document.getElementById('permError');
            try {
                debug('Solicitando acesso à câmera...');

                // Tentar primeiro com áudio e vídeo
                try {
                    cameraStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 3840 },
                            height: { ideal: 2160 }
                        },
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });
                    debug('Stream com áudio e vídeo obtido');
                } catch (audioErr) {
                    debug('Falha com áudio, tentando apenas vídeo...');
                    // Fallback: apenas vídeo
                    cameraStream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'user',
                            width: { ideal: 3840 },
                            height: { ideal: 2160 }
                        }
                    });
                    debug('Stream apenas vídeo obtido');
                }

                // Verificar se o stream tem tracks de vídeo
                const videoTracks = cameraStream.getVideoTracks();
                if (videoTracks.length === 0) {
                    throw new Error('Nenhuma track de vídeo encontrada no stream');
                }

                // Get actual resolution
                const track = videoTracks[0];
                const settings = track.getSettings();
                videoWidth = settings.width || 1920;
                videoHeight = settings.height || 1080;

                debug(`Resolução da câmera: ${videoWidth}×${videoHeight}`);
                debug(`Tracks - Vídeo: ${videoTracks.length}, Áudio: ${cameraStream.getAudioTracks().length}`);

                mainCameraVideo.srcObject = cameraStream;
                resBadge.textContent = `${videoWidth}×${videoHeight}`;
                recResBadge.textContent = videoWidth >= 3840 ? '4K' : `${videoWidth}p`;

                // Hide permission screen, show main app
                permissionScreen.classList.add('hidden');
                setTimeout(() => {
                    permissionScreen.style.display = 'none';
                    mainApp.classList.add('active');
                    showToast('Câmera ativada — ' + videoWidth + '×' + videoHeight);
                }, 500);

            } catch (err) {
                console.error(err);
                debug('ERRO ao acessar câmera: ' + err.message);
                errEl.textContent = 'Não foi possível acessar a câmera. Verifique as permissões do navegador.';
                errEl.style.display = 'block';
            }
        }

        // ============================================================
        // PANEL TOGGLE
        // ============================================================
        function togglePanel() {
            panelExpanded = !panelExpanded;
            const panel = document.getElementById('textPanel');
            if (panelExpanded) {
                panel.classList.remove('collapsed');
            } else {
                panel.classList.add('collapsed');
            }
        }

        // ============================================================
        // SPEED & FONT CONTROLS
        // ============================================================
        function adjustSpeed(delta) {
            scrollSpeed = Math.max(1, Math.min(20, scrollSpeed + delta));
            document.getElementById('speedVal').textContent = scrollSpeed;
        }

        function adjustFont(delta) {
            fontSize = Math.max(18, Math.min(80, fontSize + delta));
            document.getElementById('fontVal').textContent = fontSize;
        }

        // ============================================================
        // SCRIPT INPUT
        // ============================================================
        scriptInput.addEventListener('input', () => {
            const len = scriptInput.value.length;
            charCount.textContent = len.toLocaleString('pt-BR') + ' caracteres';
        });

        // ============================================================
        // COUNTDOWN
        // ============================================================
        function startCountdown() {
            const text = scriptInput.value.trim();
            if (!text) {
                showToast('Digite ou cole o texto do roteiro antes de gravar.');
                return;
            }

            if (!cameraStream) {
                showToast('Câmera não está ativa. Permita o acesso primeiro.');
                return;
            }

            // Hide text panel
            document.getElementById('textPanel').classList.add('collapsed');
            panelExpanded = false;

            // Show countdown
            countdownOverlay.classList.add('active');
            let count = 5;
            countdownNum.textContent = count;

            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNum.textContent = count;
                    countdownNum.style.animation = 'none';
                    countdownNum.offsetHeight;
                    countdownNum.style.animation = 'countPop 1s ease-out';
                } else {
                    clearInterval(countInterval);
                    countdownOverlay.classList.remove('active');
                    beginRecording();
                }
            }, 1000);
        }

        // ============================================================
        // BEGIN RECORDING - CORRIGIDO
        // ============================================================
        function beginRecording() {
            debug('=== INICIANDO GRAVAÇÃO ===');
            isRecording = true;
            isStopping = false;
            recordedChunks = [];
            recorderMimeType = '';

            // Setup recording video
            recVideo.srcObject = cameraStream;

            // Setup teleprompter text
            const text = scriptInput.value.trim();
            const paragraphs = text.split('\n');
            tpScrollContent.innerHTML = paragraphs
                .map(p => p.trim() ? `<p>${p}</p>` : '')
                .join('');
            tpScrollContent.style.fontSize = fontSize + 'px';

            // Reset scroll
            scrollPos = 0;
            tpScrollContent.style.transform = `translateY(0px)`;
            tpProgressFill.style.width = '0%';
            tpVisible = true;
            tpScrollContent.style.opacity = '1';

            // Show recording screen
            recordingScreen.classList.add('active');

            // Start media recorder
            const recorderStarted = startMediaRecorder();

            if (!recorderStarted) {
                debug('FALHA: Não foi possível iniciar o MediaRecorder');
                showToast('Erro ao iniciar gravação. Verifique o console.');
                stopRecording();
                return;
            }

            // Start scroll
            startScroll();

            // Start timer
            recStartTime = Date.now();
            recTimerInterval = setInterval(updateRecTimer, 1000);

            showToast('Gravação iniciada!');
        }

        // ============================================================
        // MEDIARECORDER - CORRIGIDO E ROBUSTO
        // ============================================================
        function startMediaRecorder() {
            debug('Configurando MediaRecorder...');

            if (!cameraStream) {
                debug('ERRO: Stream da câmera não disponível');
                return false;
            }

            // Verificar se há tracks ativas
            const videoTracks = cameraStream.getVideoTracks();
            const audioTracks = cameraStream.getAudioTracks();

            debug(`Tracks ativas - Vídeo: ${videoTracks.length}, Áudio: ${audioTracks.length}`);

            if (videoTracks.length === 0) {
                debug('ERRO: Nenhuma track de vídeo ativa');
                return false;
            }

            // Verificar se as tracks estão prontas
            const videoTrack = videoTracks[0];
            debug(`Track de vídeo estado: ${videoTrack.readyState}, ativa: ${videoTrack.enabled}`);

            // Determinar o melhor mimeType disponível
            // ORDEM DE PRIORIDADE: VP9 > VP8 > sem codec especificado
            const mimeTypes = [
                'video/webm;codecs=vp9,opus',
                'video/webm;codecs=vp9',
                'video/webm;codecs=vp8,opus',
                'video/webm;codecs=vp8',
                'video/webm',
                'video/mp4'
            ];

            let selectedMimeType = '';
            for (const type of mimeTypes) {
                if (MediaRecorder.isTypeSupported(type)) {
                    selectedMimeType = type;
                    debug(`MimeType suportado encontrado: ${type}`);
                    break;
                } else {
                    debug(`MimeType NÃO suportado: ${type}`);
                }
            }

            if (!selectedMimeType) {
                debug('ERRO: Nenhum mimeType suportado encontrado');
                showToast('Seu navegador não suporta gravação de vídeo.');
                return false;
            }

            // Configurações do MediaRecorder
            const options = {
                videoBitsPerSecond: 8000000,  // 8 Mbps (mais conservador)
                audioBitsPerSecond: 128000     // 128 kbps
            };

            if (selectedMimeType) {
                options.mimeType = selectedMimeType;
            }

            debug(`Tentando criar MediaRecorder com: ${JSON.stringify(options)}`);

            try {
                mediaRecorder = new MediaRecorder(cameraStream, options);
                recorderMimeType = selectedMimeType;
                debug('MediaRecorder criado com sucesso');
            } catch (err) {
                debug('ERRO ao criar MediaRecorder: ' + err.message);

                // Tentar sem opções
                try {
                    debug('Tentando criar MediaRecorder sem opções...');
                    mediaRecorder = new MediaRecorder(cameraStream);
                    recorderMimeType = mediaRecorder.mimeType || 'video/webm';
                    debug('MediaRecorder criado sem opções. MimeType: ' + recorderMimeType);
                } catch (err2) {
                    debug('ERRO FATAL: Não foi possível criar MediaRecorder: ' + err2.message);
                    return false;
                }
            }

            // Verificar estado do MediaRecorder
            debug(`MediaRecorder estado inicial: ${mediaRecorder.state}`);

            // Handler para dados disponíveis
            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) {
                    recordedChunks.push(e.data);
                    debug(`Chunk recebido: ${e.data.size} bytes (total: ${recordedChunks.length} chunks)`);
                } else {
                    debug('ondataavailable chamado mas sem dados');
                }
            };

            // Handler quando a gravação para
            mediaRecorder.onstop = () => {
                debug('MediaRecorder parado. Processando gravação...');
                debug(`Total de chunks: ${recordedChunks.length}`);

                if (recordedChunks.length === 0) {
                    debug('ERRO: Nenhum chunk gravado');
                    showToast('Erro: Nenhum dado de vídeo foi gravado.');
                    return;
                }

                // Criar blob com todos os chunks
                const blobType = recorderMimeType || 'video/webm';
                debug(`Criando blob com tipo: ${blobType}`);

                try {
                    const blob = new Blob(recordedChunks, { type: blobType });
                    debug(`Blob criado: ${blob.size} bytes`);

                    if (blob.size === 0) {
                        debug('ERRO: Blob vazio');
                        showToast('Erro: Arquivo de vídeo vazio.');
                        return;
                    }

                    const url = URL.createObjectURL(blob);
                    recCount++;

                    const duration = recTime.textContent;

                    recordings.unshift({
                        id: recCount,
                        url: url,
                        blob: blob,
                        mimeType: blobType,
                        duration: duration,
                        resolution: recResBadge.textContent,
                        timestamp: new Date().toLocaleString('pt-BR'),
                        size: blob.size
                    });

                    renderGallery();
                    showToast(`Gravação #${recCount} salva — ${duration}`);
                    debug(`Gravação #${recCount} finalizada com sucesso`);

                } catch (err) {
                    debug('ERRO ao criar blob: ' + err.message);
                    showToast('Erro ao processar vídeo gravado.');
                }
            };

            // Handler de erro do MediaRecorder
            mediaRecorder.onerror = (e) => {
                debug('ERRO no MediaRecorder: ' + (e.message || 'Erro desconhecido'));
                showToast('Erro durante a gravação.');
            };

            // Iniciar gravação
            try {
                // Usar timeslice maior (500ms) para evitar perda de dados
                mediaRecorder.start(500);
                debug(`MediaRecorder iniciado com timeslice 500ms. Estado: ${mediaRecorder.state}`);

                // Verificar se realmente iniciou
                if (mediaRecorder.state !== 'recording') {
                    debug('ERRO: MediaRecorder não entrou em estado recording');
                    return false;
                }

                return true;

            } catch (err) {
                debug('ERRO ao iniciar MediaRecorder: ' + err.message);
                return false;
            }
        }

        // ============================================================
        // SCROLL DO TELEPROMPTER
        // ============================================================
        function startScroll() {
            if (scrollRAF) cancelAnimationFrame(scrollRAF);

            function step() {
                scrollPos += scrollSpeed * 0.4;
                const totalH = tpScrollContent.scrollHeight;
                const viewH = window.innerHeight;
                const maxScroll = totalH - viewH;

                if (maxScroll > 0) {
                    const pct = Math.min(scrollPos / maxScroll * 100, 100);
                    tpProgressFill.style.width = pct + '%';
                } else {
                    tpProgressFill.style.width = '100%';
                }

                tpScrollContent.style.transform = `translateY(${-scrollPos}px)`;
                scrollRAF = requestAnimationFrame(step);
            }

            scrollRAF = requestAnimationFrame(step);
        }

        function updateRecTimer() {
            const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
            const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const sec = String(elapsed % 60).padStart(2, '0');
            recTime.textContent = `${min}:${sec}`;
        }

        // ============================================================
        // CONTROLES DURANTE GRAVAÇÃO
        // ============================================================
        function adjustRecSpeed(delta) {
            scrollSpeed = Math.max(1, Math.min(20, scrollSpeed + delta));
            document.getElementById('recSpeedDisplay').textContent = scrollSpeed + 'x';
        }

        function adjustRecFont(delta) {
            fontSize = Math.max(18, Math.min(80, fontSize + delta));
            tpScrollContent.style.fontSize = fontSize + 'px';
        }

        function rewindText() {
            scrollPos = 0;
            tpScrollContent.style.transform = `translateY(0px)`;
            tpProgressFill.style.width = '0%';
            showToast('Texto reiniciado');
        }

        function toggleTPVisibility() {
            tpVisible = !tpVisible;
            tpScrollContent.style.opacity = tpVisible ? '1' : '0';
            document.querySelector('.tp-guide').style.opacity = tpVisible ? '1' : '0';
            document.querySelector('.tp-progress').style.opacity = tpVisible ? '1' : '0';
        }

        // ============================================================
        // PARAR GRAVAÇÃO - CORRIGIDO
        // ============================================================
        function stopRecording() {
            debug('=== PARANDO GRAVAÇÃO ===');

            // Evitar múltiplas chamadas
            if (isStopping) {
                debug('Já está parando, ignorando chamada duplicada');
                return;
            }
            isStopping = true;
            isRecording = false;

            // Parar scroll
            if (scrollRAF) {
                cancelAnimationFrame(scrollRAF);
                scrollRAF = null;
            }

            // Parar timer
            if (recTimerInterval) {
                clearInterval(recTimerInterval);
                recTimerInterval = null;
            }

            // Parar MediaRecorder de forma segura
            if (mediaRecorder) {
                debug(`Estado do MediaRecorder: ${mediaRecorder.state}`);

                if (mediaRecorder.state === 'recording') {
                    try {
                        // Solicitar dados finais antes de parar
                        mediaRecorder.requestData();
                        debug('requestData() chamado');

                        // Pequeno delay para garantir que o último chunk seja processado
                        setTimeout(() => {
                            try {
                                mediaRecorder.stop();
                                debug('stop() chamado com sucesso');
                            } catch (err) {
                                debug('ERRO ao chamar stop(): ' + err.message);
                                // Tentar finalizar mesmo assim
                                finalizeRecordingFallback();
                            }
                        }, 200);

                    } catch (err) {
                        debug('ERRO ao parar MediaRecorder: ' + err.message);
                        finalizeRecordingFallback();
                    }
                } else if (mediaRecorder.state === 'inactive') {
                    debug('MediaRecorder já estava inativo');
                    finalizeRecordingFallback();
                }
            } else {
                debug('MediaRecorder não existe');
            }

            // Limpar UI
            recordingScreen.classList.remove('active');
            recVideo.srcObject = null;

            // Mostrar painel de texto
            const panel = document.getElementById('textPanel');
            panel.classList.remove('collapsed');
            panelExpanded = true;

            // Reset timer
            recTime.textContent = '00:00';
        }

        // Fallback se o onstop não for chamado
        function finalizeRecordingFallback() {
            debug('Executando fallback de finalização...');

            if (recordedChunks.length === 0) {
                debug('ERRO: Nenhum chunk no fallback');
                showToast('Erro: Nenhum dado de vídeo gravado.');
                return;
            }

            const blobType = recorderMimeType || 'video/webm';
            try {
                const blob = new Blob(recordedChunks, { type: blobType });
                if (blob.size === 0) {
                    debug('ERRO: Blob vazio no fallback');
                    showToast('Erro: Arquivo de vídeo vazio.');
                    return;
                }

                const url = URL.createObjectURL(blob);
                recCount++;

                recordings.unshift({
                    id: recCount,
                    url: url,
                    blob: blob,
                    mimeType: blobType,
                    duration: recTime.textContent,
                    resolution: recResBadge.textContent,
                    timestamp: new Date().toLocaleString('pt-BR'),
                    size: blob.size
                });

                renderGallery();
                showToast(`Gravação #${recCount} salva (fallback)`);

            } catch (err) {
                debug('ERRO no fallback: ' + err.message);
                showToast('Erro ao processar vídeo.');
            }
        }

        // ============================================================
        // GALERIA
        // ============================================================
        function renderGallery() {
            if (recordings.length === 0) {
                gallerySection.classList.remove('active');
                return;
            }

            gallerySection.classList.add('active');
            galleryList.innerHTML = recordings.map(rec => `
                <div class="gallery-item">
                    <video src="${rec.url}" preload="metadata" playsinline></video>
                    <div class="gallery-item-info">
                        <div>
                            <span>#${rec.id} — ${rec.duration}</span>
                            <br><span style="color:var(--text-dim);font-size:11px;">${rec.resolution} • ${formatBytes(rec.size)}</span>
                        </div>
                        <button class="gallery-dl-btn" onclick="downloadRec(${rec.id})" title="Baixar">
                            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // ============================================================
        // DOWNLOAD - CORRIGIDO
        // ============================================================
        function downloadRec(id) {
            const rec = recordings.find(r => r.id === id);
            if (!rec) {
                showToast('Erro: Gravação não encontrada.');
                return;
            }

            if (!rec.blob || rec.blob.size === 0) {
                showToast('Erro: Arquivo de vídeo vazio ou corrompido.');
                return;
            }

            // Determinar extensão correta
            let ext = 'webm';
            if (rec.mimeType) {
                if (rec.mimeType.includes('mp4')) ext = 'mp4';
                else if (rec.mimeType.includes('webm')) ext = 'webm';
                else if (rec.mimeType.includes('ogg')) ext = 'ogg';
            }

            const filename = `teleprompter-studio-${rec.id}-${rec.timestamp.replace(/[/:]/g, '-')}.${ext}`;
            debug(`Iniciando download: ${filename} (${formatBytes(rec.size)})`);

            try {
                const a = document.createElement('a');
                a.href = rec.url;
                a.download = filename;
                a.style.display = 'none';
                document.body.appendChild(a);

                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    cancelable: true,
                    view: window
                });
                a.dispatchEvent(clickEvent);

                document.body.removeChild(a);
                showToast(`Download iniciado: ${filename}`);

            } catch (err) {
                debug('ERRO no download: ' + err.message);
                window.open(rec.url, '_blank');
                showToast('Download alternativo aberto em nova aba.');
            }
        }

        // ============================================================
        // TOAST
        // ============================================================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ============================================================
        // KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (!isRecording) return;

            switch (e.key) {
                case ' ':
                    e.preventDefault();
                    if (scrollRAF) {
                        cancelAnimationFrame(scrollRAF);
                        scrollRAF = null;
                        showToast('Texto pausado');
                    } else {
                        startScroll();
                        showToast('Texto continuando');
                    }
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    adjustRecSpeed(1);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    adjustRecSpeed(-1);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    adjustRecFont(2);
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    adjustRecFont(-2);
                    break;
                case 'Home':
                    e.preventDefault();
                    rewindText();
                    break;
                case 't':
                case 'T':
                    toggleTPVisibility();
                    break;
                case 'Escape':
                    stopRecording();
                    break;
            }
        });

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        debug('Teleprompter Studio carregado');
        debug(`Navegador: ${navigator.userAgent}`);

        // Verificar suporte a MediaRecorder
        if (typeof MediaRecorder === 'undefined') {
            debug('ERRO FATAL: MediaRecorder não suportado neste navegador');
            showToast('Seu navegador não suporta gravação de vídeo.');
        } else {
            debug('MediaRecorder disponível');
        }
    </script>
</body>
</html>
